services:
  api:
    build:
      context: ./apps/api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: /data/pricepulse.sqlite
      CORS_ORIGIN: http://localhost:5173
      PRICE_SIMULATION_INTERVAL_MS: 30000
    volumes:
      - api-data:/data
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-data:
